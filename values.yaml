replicaCount: 2

image:
  repository: bazeemme/my-demo-project-repo
  tag: latest
  pullPolicy: Always

service:
  type: NodePort
  port: 8080

ingress:
  enabled: true
  className: nginx
  host: demo.local
  path: /

autoscaling:
  enabled: true
  minReplicas: 1
  maxReplicas: 5
  targetCPUUtilizationPercentage: 50

resources: {}

